services:
  alarm:
    build: .
    restart: unless-stopped
    ports:
      - "${WEBHOOK_PORT:-8080}:${WEBHOOK_PORT:-8080}"
    env_file:
      - .env
    environment:
      - TRIMLIGHT_HOST=${TRIMLIGHT_HOST}
      - TRIMLIGHT_PORT=${TRIMLIGHT_PORT:-8189}
      - WEBHOOK_PORT=${WEBHOOK_PORT:-8080}
      - ALARM_TIMEOUT=${ALARM_TIMEOUT:-30}
      - TRIGGER_KEY=${TRIGGER_KEY:-animal}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
